name: portfolio

services:
  app:
    build:
      context: .
      target: prod
    ports:
      - "${PORTFOLIO_PORT:-9666}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app-dev:
    build:
      context: .
      target: dev
    profiles:
      - dev
    command: npm run dev -- --host 0.0.0.0 --port 9666
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${PORTFOLIO_DEV_PORT:-9667}:9666"
    volumes:
      - .:/app
      - portfolio_node_modules:/app/node_modules

volumes:
  portfolio_node_modules:
