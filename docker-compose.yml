services:
  app:
    build:
      context: .
      target: prod
    image: portfolio:prod
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "${PORTFOLIO_PORT:-9666}:80"

  app-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    image: portfolio:dev
    container_name: portfolio-dev
    ports:
      - "${PORTFOLIO_DEV_PORT:-9667}:9666"
    volumes:
      - .:/app
      - portfolio_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 9666

volumes:
  portfolio_node_modules:
